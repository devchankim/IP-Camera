<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IP Camera</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px);
        }

        .home-shell {
            width: min(540px, 94vw);
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 40px 0 56px;
        }

        .hero { text-align: center; }

        .hero-icon {
            font-size: 56px;
            line-height: 1;
            margin-bottom: 12px;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0, 122, 255, 0.25));
        }

        .hero-title {
            margin: 0;
            font-size: clamp(34px, 8vw, 52px);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #1d1d1f 20%, rgba(0, 122, 255, 0.85));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            margin: 8px 0 0;
            font-size: 16px;
            color: var(--ios-text-2);
            letter-spacing: -0.01em;
        }

        .home-card { padding: 0; overflow: hidden; }

        .section-row {
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-row + .section-row {
            border-top: 1px solid var(--ios-separator);
        }

        .section-title {
            margin: 0;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .section-desc {
            margin: 3px 0 0;
            font-size: 13px;
            color: var(--ios-text-2);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .btn-grid .btn { width: 100%; justify-content: center; }

        @media (max-width: 400px) {
            .btn-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<main class="home-shell">

    <header class="hero">
        <span class="hero-icon">&#128247;</span>
        <h1 class="hero-title">IP Camera</h1>
        <p class="hero-subtitle">Real-time WebRTC monitoring.</p>
    </header>

    <section class="app-card home-card">

        <div class="section-row">
            <div>
                <h2 class="section-title">Live View</h2>
                <p class="section-desc">Low-latency video &amp; audio via WebRTC.</p>
            </div>
            <div class="btn-grid">
                <a href="webrtc_viewer.html" class="btn btn-primary">Open Viewer</a>
                <a href="settings.html"      class="btn btn-secondary">Settings</a>
            </div>
        </div>

        <div class="section-row">
            <div>
                <h2 class="section-title">Media</h2>
                <p class="section-desc">Capture snapshots and review in gallery.</p>
            </div>
            <div class="btn-grid">
                <a href="gallery.html" class="btn btn-primary">Gallery</a>
                <a href="stream.html"  class="btn btn-secondary">Legacy Stream</a>
            </div>
        </div>

        <div class="section-row">
            <div>
                <h2 class="section-title">Account</h2>
                <p class="section-desc">Sign in for screenshot &amp; gallery features.</p>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <div id="auth-container" style="display:flex; gap:10px;">
                    <a href="login.html"    id="login_button"    class="btn btn-primary"   style="flex:1; justify-content:center;">Login</a>
                    <a href="register.html" id="register_button" class="btn btn-secondary" style="flex:1; justify-content:center;">Register</a>
                </div>
                <button id="logout_button" class="btn btn-secondary" style="display:none; width:100%;">Logout</button>
            </div>
        </div>

    </section>

</main>

<script src="common.js"></script>
<script>
    const logoutButton   = document.getElementById('logout_button');
    const loginButton    = document.getElementById('login_button');
    const registerButton = document.getElementById('register_button');
    const authContainer  = document.getElementById('auth-container');

    if (getAuthorization() === '') {
        logoutButton.style.display = 'none';
    } else {
        authContainer.style.display = 'none';
        logoutButton.style.display = '';
    }

    logoutButton.addEventListener('click', () => {
        clearAuthorization();
        logoutButton.style.display = 'none';
        authContainer.style.display = 'flex';
    });
</script>
</body>
</html>
