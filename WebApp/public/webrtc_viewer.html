<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IP Camera — Live</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px);
        }

        .viewer-shell {
            width: min(820px, 94vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 28px 0 40px;
        }

        .viewer-header { text-align: center; }

        .viewer-title {
            margin: 0;
            font-size: clamp(32px, 7vw, 48px);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #1d1d1f 30%, rgba(0, 122, 255, 0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .viewer-subtitle {
            margin: 6px 0 0;
            font-size: 15px;
            color: var(--ios-text-2);
            letter-spacing: -0.01em;
        }

        .status-row {
            display: flex;
            justify-content: center;
        }

        .settings-card {
            width: 100%;
            padding: 24px;
        }

        .field-group { display: flex; flex-direction: column; gap: 14px; }
        .field-wrap  { display: flex; flex-direction: column; gap: 7px; }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ios-text-2);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .actions-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .actions-row .btn { flex: 1; min-width: 120px; }

        /* Video */
        .video-wrap {
            width: 100%;
            position: relative;
            background: #000;
            border-radius: var(--r-xl);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.30),
                        inset 0 1px 0 rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        #remote-video {
            width: 100%;
            display: block;
            background: #000;
            min-height: min(52vw, 280px);
            border-radius: var(--r-xl);
        }

        /* Floating overlay controls */
        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 18px 18px;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 10px;
            border-radius: 0 0 var(--r-xl) var(--r-xl);
        }

        .overlay-btn {
            background: rgba(20, 20, 20, 0.55);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: var(--r-pill);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 9px 18px;
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: transform 0.14s ease, background 0.14s ease;
            -webkit-appearance: none;
        }

        .overlay-btn:active { transform: scale(0.95); }
        .overlay-btn:hover  { background: rgba(40, 40, 40, 0.70); }

        .hint {
            font-size: 13px;
            color: var(--ios-text-3);
            text-align: center;
            letter-spacing: -0.01em;
        }

        @media (max-width: 680px) {
            .viewer-shell  { gap: 16px; padding: 18px 0 32px; }
            .settings-card { padding: 18px; }
            .actions-row   { flex-direction: column; }
        }
    </style>
</head>
<body>
    <main class="viewer-shell">

        <header class="viewer-header">
            <h1 class="viewer-title">Live View</h1>
            <p class="viewer-subtitle">WebRTC · Low-latency · Secure</p>
        </header>

        <div class="status-row">
            <div id="status" class="status-chip">Not connected</div>
        </div>

        <div id="settings-panel" class="app-card settings-card">
            <div class="field-group">
                <div class="field-wrap">
                    <label class="field-label" for="server-input">Signaling Server</label>
                    <input class="glass-input" type="text" id="server-input"
                           placeholder="100.x.x.x:8081" autocorrect="off"
                           autocapitalize="none" spellcheck="false">
                </div>
                <div class="field-wrap">
                    <label class="field-label" for="token-input">Access Token</label>
                    <input class="glass-input" type="password" id="token-input"
                           placeholder="Enter token">
                </div>
            </div>
            <div class="actions-row">
                <button id="connect-btn" class="btn btn-primary">Connect</button>
            </div>
        </div>

        <div class="video-wrap" id="video-section" style="display:none;">
            <video id="remote-video" autoplay playsinline controls></video>
            <div class="video-overlay">
                <button id="retry-audio-btn" class="overlay-btn" style="display:none;">Retry Audio</button>
                <button id="disconnect-btn" class="overlay-btn">Disconnect</button>
            </div>
        </div>

        <p class="hint" id="hint-text" style="display:none;">
            If audio does not start automatically, tap Retry Audio once.
        </p>

    </main>

    <script>
        const roomName = "baby";
        const statusEl = document.getElementById("status");
        const remoteVideo = document.getElementById("remote-video");
        const connectBtn = document.getElementById("connect-btn");
        const disconnectBtn = document.getElementById("disconnect-btn");
        const retryAudioBtn = document.getElementById("retry-audio-btn");
        const settingsPanel = document.getElementById("settings-panel");
        const videoSection = document.getElementById("video-section");
        const hintText = document.getElementById("hint-text");
        const serverInput = document.getElementById("server-input");
        const tokenInput = document.getElementById("token-input");

        let signalingWs = null;
        let peerConnection = null;
        let ownClientId = "";
        let cameraClientId = "";
        let remoteDescriptionSet = false;
        let pendingRemoteIceCandidates = [];
        let userInitiatedDisconnect = false;

        function setStatus(message, type = "normal") {
            statusEl.textContent = message;
            statusEl.className = `status-chip${type === "normal" ? "" : ` ${type}`}`;
        }

        function setError(message) {
            setStatus(message, "error");
            console.error(message);
            retryAudioBtn.style.display = "none";
        }

        function showVideo(show) {
            videoSection.style.display = show ? "" : "none";
            hintText.style.display = show ? "" : "none";
        }

        function closePeerConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteDescriptionSet = false;
            pendingRemoteIceCandidates = [];
            remoteVideo.srcObject = null;
            retryAudioBtn.style.display = "none";
        }

        function disconnect(userInitiated) {
            userInitiatedDisconnect = userInitiated;
            if (signalingWs) {
                signalingWs.close();
                signalingWs = null;
            }
            closePeerConnection();
            ownClientId = "";
            cameraClientId = "";
            if (!statusEl.classList.contains("error")) {
                setStatus("Disconnected");
            }
            settingsPanel.style.display = "";
            showVideo(false);
            connectBtn.disabled = false;
        }

        connectBtn.addEventListener("click", async () => {
            const server = serverInput.value.trim();
            const token = tokenInput.value.trim();
            if (!server || !token) {
                setError("Please enter server address and token");
                return;
            }
            localStorage.setItem("signaling_server", server);
            localStorage.setItem("signaling_token", token);
            await connect(server, token);
        });

        disconnectBtn.addEventListener("click", () => { disconnect(true); });
        retryAudioBtn.addEventListener("click", () => { ensurePlayback(true); });

        async function connect(server, token) {
            disconnect(false);
            userInitiatedDisconnect = false;
            setStatus("Connecting to signaling...");
            connectBtn.disabled = true;

            try {
                signalingWs = new WebSocket(`ws://${server}`);

                signalingWs.onopen = () => {
                    setStatus("Signaling connected, joining room...");
                    signalingWs.send(JSON.stringify({
                        type: "join", room: roomName, role: "viewer", token
                    }));
                };

                signalingWs.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    switch (msg.type) {
                        case "joined":
                            ownClientId = msg.clientId || "";
                            setStatus("Joined room, waiting for camera...");
                            settingsPanel.style.display = "none";
                            showVideo(true);
                            break;
                        case "peer_joined":
                            if (msg.role === "camera") {
                                cameraClientId = msg.clientId || "";
                                setStatus("Camera connected, negotiating stream...");
                                ensurePeerConnection();
                            }
                            break;
                        case "peer_left":
                            if (msg.role === "camera") {
                                setStatus("Camera disconnected, waiting for reconnect...");
                                closePeerConnection();
                                cameraClientId = "";
                            }
                            break;
                        case "offer":
                            await handleOffer(msg.sdp, msg.from || "");
                            break;
                        case "ice":
                            await handleIceCandidate(msg.candidate, msg.from || "");
                            break;
                        case "error":
                            setError(`Server error: ${msg.message}`);
                            disconnect(false);
                            break;
                    }
                };

                signalingWs.onerror = (error) => {
                    console.error("Signaling error:", error);
                    setError("Signaling connection error");
                    disconnect(false);
                };

                signalingWs.onclose = () => {
                    if (!userInitiatedDisconnect && !statusEl.classList.contains("error")) {
                        setStatus("Signaling disconnected");
                    }
                    connectBtn.disabled = false;
                };
            } catch (error) {
                setError(`Failed to connect: ${error.message}`);
                connectBtn.disabled = false;
            }
        }

        function ensurePeerConnection() {
            if (peerConnection) return;
            remoteDescriptionSet = false;
            pendingRemoteIceCandidates = [];
            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });

            peerConnection.onicecandidate = (event) => {
                if (!event.candidate || !cameraClientId) return;
                if (signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                    signalingWs.send(JSON.stringify({
                        type: "ice", room: roomName, to: cameraClientId,
                        candidate: {
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex,
                            candidate: event.candidate.candidate
                        }
                    }));
                }
            };

            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    setStatus("Streaming", "connected");
                    ensurePlayback(false);
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                if (!peerConnection) return;
                const state = peerConnection.iceConnectionState;
                if (state === "failed" || state === "disconnected") {
                    setError("Connection lost");
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (!peerConnection) return;
                if (peerConnection.connectionState === "connected") {
                    setStatus("Streaming", "connected");
                }
            };
        }

        async function handleOffer(sdp, fromClientId) {
            if (fromClientId) cameraClientId = fromClientId;
            if (!peerConnection) ensurePeerConnection();
            try {
                await peerConnection.setRemoteDescription({ type: "offer", sdp });
                remoteDescriptionSet = true;
                await flushPendingRemoteIceCandidates();
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                signalingWs.send(JSON.stringify({
                    type: "answer", room: roomName, to: cameraClientId, sdp: answer.sdp
                }));
                setStatus("Connected, waiting for media...");
            } catch (error) {
                setError(`Failed to handle offer: ${error.message}`);
            }
        }

        async function handleIceCandidate(candidate, fromClientId) {
            if (fromClientId) cameraClientId = fromClientId;
            if (!peerConnection || !remoteDescriptionSet) {
                pendingRemoteIceCandidates.push(candidate);
                return;
            }
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate({
                    sdpMid: candidate.sdpMid,
                    sdpMLineIndex: candidate.sdpMLineIndex,
                    candidate: candidate.candidate
                }));
            } catch (error) {
                console.error("Failed to add ICE candidate:", error);
            }
        }

        async function flushPendingRemoteIceCandidates() {
            if (!peerConnection || !remoteDescriptionSet || pendingRemoteIceCandidates.length === 0) return;
            const queue = pendingRemoteIceCandidates.slice();
            pendingRemoteIceCandidates = [];
            for (const candidate of queue) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate({
                        sdpMid: candidate.sdpMid,
                        sdpMLineIndex: candidate.sdpMLineIndex,
                        candidate: candidate.candidate
                    }));
                } catch (error) {
                    console.error("Failed to add queued ICE candidate:", error);
                }
            }
        }

        function ensurePlayback(userTriggered) {
            if (!remoteVideo.srcObject) return;
            remoteVideo.muted = false;
            const playPromise = remoteVideo.play();
            if (playPromise && typeof playPromise.then === "function") {
                playPromise.then(() => {
                    retryAudioBtn.style.display = "none";
                    if (userTriggered && !statusEl.classList.contains("error")) {
                        setStatus("Streaming", "connected");
                    }
                }).catch(() => {
                    retryAudioBtn.style.display = "inline-flex";
                    if (!statusEl.classList.contains("error")) {
                        setStatus("Tap Retry Audio to start sound");
                    }
                });
            }
        }

        window.addEventListener("load", () => {
            const savedServer = localStorage.getItem("signaling_server");
            const savedToken  = localStorage.getItem("signaling_token");
            if (savedServer) serverInput.value = savedServer;
            if (savedToken)  tokenInput.value  = savedToken;
        });
    </script>
</body>
</html>
