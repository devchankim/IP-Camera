<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Camera WebRTC Viewer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .viewer-shell {
            width: min(980px, 94vw);
            margin: 0 auto;
            padding: 24px 0 42px;
        }

        .viewer-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .viewer-card {
            padding: 22px;
        }

        .status-row {
            display: flex;
            justify-content: center;
            margin: 0 0 14px;
        }

        .settings-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr;
            margin-bottom: 14px;
        }

        .field-label {
            display: block;
            font-size: 13px;
            color: var(--apple-text-subtle);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .field-input {
            width: 100%;
            border: 1px solid var(--apple-border);
            background: var(--apple-surface-soft);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            color: var(--apple-text);
        }

        .field-input:focus {
            outline: none;
            border-color: var(--apple-primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.16);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .primary-btn,
        .secondary-btn {
            border: 1px solid transparent;
            border-radius: 12px;
            min-height: 44px;
            font-size: 15px;
            font-weight: 600;
            padding: 0 18px;
            cursor: pointer;
        }

        .primary-btn {
            background: var(--apple-primary);
            color: #fff;
        }

        .primary-btn:hover {
            background: var(--apple-primary-hover);
        }

        .primary-btn:disabled {
            background: #b9c8db;
            cursor: not-allowed;
        }

        .secondary-btn {
            background: #fff;
            border-color: #c7c7cc;
            color: #1d1d1f;
        }

        .secondary-btn:hover {
            border-color: #9fa2a8;
            background: #fafafa;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        #remote-video {
            width: 100%;
            display: block;
            background: #000;
            min-height: min(56vw, 260px);
        }

        .hint {
            margin-top: 10px;
            font-size: 13px;
            color: var(--apple-text-subtle);
            text-align: center;
        }

        @media (max-width: 700px) {
            .viewer-card {
                padding: 18px;
            }

            .actions {
                display: grid;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="viewer-shell">
        <header class="viewer-header">
            <h1 class="page-title">WebRTC Live Viewer</h1>
            <p class="page-subtitle">Low-latency video + audio streaming for mobile browsers.</p>
        </header>

        <section class="app-card viewer-card">
            <div class="status-row">
                <div id="status" class="status-chip">Not connected</div>
            </div>

            <div id="settings-panel" class="settings-grid">
                <div>
                    <label class="field-label" for="server-input">Signaling Server (IP:Port)</label>
                    <input class="field-input" type="text" id="server-input" placeholder="192.168.0.101:8081" value="192.168.0.101:8081">
                </div>
                <div>
                    <label class="field-label" for="token-input">Signaling Token</label>
                    <input class="field-input" type="password" id="token-input" placeholder="Enter your token">
                </div>
            </div>

            <div class="actions">
                <button id="connect-btn" class="primary-btn">Connect</button>
                <button id="disconnect-btn" class="secondary-btn" style="display:none;">Disconnect</button>
                <button id="retry-audio-btn" class="secondary-btn" style="display:none;">Retry Audio</button>
            </div>

            <div class="video-wrap">
                <video id="remote-video" autoplay playsinline controls></video>
            </div>
            <p class="hint">If audio does not start automatically, tap Retry Audio once.</p>
        </section>
    </main>

    <script>
        const roomName = "baby";
        const statusEl = document.getElementById("status");
        const remoteVideo = document.getElementById("remote-video");
        const connectBtn = document.getElementById("connect-btn");
        const disconnectBtn = document.getElementById("disconnect-btn");
        const retryAudioBtn = document.getElementById("retry-audio-btn");
        const settingsPanel = document.getElementById("settings-panel");
        const serverInput = document.getElementById("server-input");
        const tokenInput = document.getElementById("token-input");

        let signalingWs = null;
        let peerConnection = null;
        let ownClientId = "";
        let cameraClientId = "";
        let remoteDescriptionSet = false;
        let pendingRemoteIceCandidates = [];
        let userInitiatedDisconnect = false;

        function setStatus(message, type = "normal") {
            statusEl.textContent = message;
            statusEl.className = `status-chip${type === "normal" ? "" : ` ${type}`}`;
        }

        function setError(message) {
            setStatus(message, "error");
            console.error(message);
            retryAudioBtn.style.display = "none";
        }

        function closePeerConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteDescriptionSet = false;
            pendingRemoteIceCandidates = [];
            remoteVideo.srcObject = null;
            retryAudioBtn.style.display = "none";
        }

        function disconnect(userInitiated) {
            userInitiatedDisconnect = userInitiated;
            if (signalingWs) {
                signalingWs.close();
                signalingWs = null;
            }

            closePeerConnection();
            ownClientId = "";
            cameraClientId = "";
            if (!statusEl.classList.contains("error")) {
                setStatus("Disconnected");
            }
            settingsPanel.style.display = "";
            disconnectBtn.style.display = "none";
            connectBtn.disabled = false;
        }

        connectBtn.addEventListener("click", async () => {
            const server = serverInput.value.trim();
            const token = tokenInput.value.trim();

            if (!server || !token) {
                setError("Please enter server address and token");
                return;
            }

            localStorage.setItem("signaling_server", server);
            localStorage.setItem("signaling_token", token);
            await connect(server, token);
        });

        disconnectBtn.addEventListener("click", () => {
            disconnect(true);
        });

        retryAudioBtn.addEventListener("click", () => {
            ensurePlayback(true);
        });

        async function connect(server, token) {
            disconnect(false);
            userInitiatedDisconnect = false;
            setStatus("Connecting to signaling...");
            connectBtn.disabled = true;

            try {
                signalingWs = new WebSocket(`ws://${server}`);

                signalingWs.onopen = () => {
                    setStatus("Signaling connected, joining room...");
                    signalingWs.send(JSON.stringify({
                        type: "join",
                        room: roomName,
                        role: "viewer",
                        token
                    }));
                };

                signalingWs.onmessage = async (event) => {
                    const msg = JSON.parse(event.data);
                    switch (msg.type) {
                        case "joined":
                            ownClientId = msg.clientId || "";
                            setStatus("Joined room, waiting for camera...");
                            settingsPanel.style.display = "none";
                            disconnectBtn.style.display = "inline-flex";
                            break;

                        case "peer_joined":
                            if (msg.role === "camera") {
                                cameraClientId = msg.clientId || "";
                                setStatus("Camera connected, negotiating stream...");
                                ensurePeerConnection();
                            }
                            break;

                        case "peer_left":
                            if (msg.role === "camera") {
                                setStatus("Camera disconnected, waiting for reconnect...");
                                closePeerConnection();
                                cameraClientId = "";
                            }
                            break;

                        case "offer":
                            await handleOffer(msg.sdp, msg.from || "");
                            break;

                        case "ice":
                            await handleIceCandidate(msg.candidate, msg.from || "");
                            break;

                        case "error":
                            setError(`Server error: ${msg.message}`);
                            disconnect(false);
                            break;
                    }
                };

                signalingWs.onerror = (error) => {
                    console.error("Signaling error:", error);
                    setError("Signaling connection error");
                    disconnect(false);
                };

                signalingWs.onclose = () => {
                    if (!userInitiatedDisconnect && !statusEl.classList.contains("error")) {
                        setStatus("Signaling disconnected");
                    }
                    connectBtn.disabled = false;
                };
            } catch (error) {
                setError(`Failed to connect: ${error.message}`);
                connectBtn.disabled = false;
            }
        }

        function ensurePeerConnection() {
            if (peerConnection) {
                return;
            }
            remoteDescriptionSet = false;
            pendingRemoteIceCandidates = [];
            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });

            peerConnection.onicecandidate = (event) => {
                if (!event.candidate || !cameraClientId) {
                    return;
                }
                if (signalingWs && signalingWs.readyState === WebSocket.OPEN) {
                    signalingWs.send(JSON.stringify({
                        type: "ice",
                        room: roomName,
                        to: cameraClientId,
                        candidate: {
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex,
                            candidate: event.candidate.candidate
                        }
                    }));
                }
            };

            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    setStatus("Streaming", "connected");
                    ensurePlayback(false);
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                if (!peerConnection) {
                    return;
                }
                const state = peerConnection.iceConnectionState;
                if (state === "failed" || state === "disconnected") {
                    setError("Connection lost");
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (!peerConnection) {
                    return;
                }
                if (peerConnection.connectionState === "connected") {
                    setStatus("Streaming", "connected");
                }
            };
        }

        async function handleOffer(sdp, fromClientId) {
            if (fromClientId) {
                cameraClientId = fromClientId;
            }
            if (!peerConnection) {
                ensurePeerConnection();
            }
            try {
                await peerConnection.setRemoteDescription({ type: "offer", sdp });
                remoteDescriptionSet = true;
                await flushPendingRemoteIceCandidates();

                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                signalingWs.send(JSON.stringify({
                    type: "answer",
                    room: roomName,
                    to: cameraClientId,
                    sdp: answer.sdp
                }));
                setStatus("Connected, waiting for media...");
            } catch (error) {
                setError(`Failed to handle offer: ${error.message}`);
            }
        }

        async function handleIceCandidate(candidate, fromClientId) {
            if (fromClientId) {
                cameraClientId = fromClientId;
            }
            if (!peerConnection || !remoteDescriptionSet) {
                pendingRemoteIceCandidates.push(candidate);
                return;
            }
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate({
                    sdpMid: candidate.sdpMid,
                    sdpMLineIndex: candidate.sdpMLineIndex,
                    candidate: candidate.candidate
                }));
            } catch (error) {
                console.error("Failed to add ICE candidate:", error);
            }
        }

        async function flushPendingRemoteIceCandidates() {
            if (!peerConnection || !remoteDescriptionSet || pendingRemoteIceCandidates.length === 0) {
                return;
            }
            const queue = pendingRemoteIceCandidates.slice();
            pendingRemoteIceCandidates = [];

            for (const candidate of queue) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate({
                        sdpMid: candidate.sdpMid,
                        sdpMLineIndex: candidate.sdpMLineIndex,
                        candidate: candidate.candidate
                    }));
                } catch (error) {
                    console.error("Failed to add queued ICE candidate:", error);
                }
            }
        }

        function ensurePlayback(userTriggered) {
            if (!remoteVideo.srcObject) {
                return;
            }
            remoteVideo.muted = false;
            const playPromise = remoteVideo.play();
            if (playPromise && typeof playPromise.then === "function") {
                playPromise.then(() => {
                    retryAudioBtn.style.display = "none";
                    if (userTriggered && !statusEl.classList.contains("error")) {
                        setStatus("Streaming", "connected");
                    }
                }).catch(() => {
                    retryAudioBtn.style.display = "inline-flex";
                    if (!statusEl.classList.contains("error")) {
                        setStatus("Tap Retry Audio to start sound");
                    }
                });
            }
        }

        window.addEventListener("load", () => {
            const savedServer = localStorage.getItem("signaling_server");
            const savedToken = localStorage.getItem("signaling_token");
            if (savedServer) {
                serverInput.value = savedServer;
            }
            if (savedToken) {
                tokenInput.value = savedToken;
            }
        });
    </script>
</body>
</html>
